<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Outreach Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F1419; --s1:#171E27; --s2:#1F2832; --s3:#27313D;
    --bd:#2B3743; --bd2:#374755;
    --tx:#EAEEF3; --dim:#93A1B0; --faint:#5E6B78;
    --acc:#FF6A3D; --acc-d:#E8551F; --cyan:#4FB8E8;
    --won:#34D399; --warn:#FBBF24; --lost:#F87171; --violet:#A78BFA;
    --grid:#1c242e;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --disp:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--tx);font-family:var(--body);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:44px 44px;opacity:.4;mask-image:radial-gradient(circle at 50% 0%,#000,transparent 80%)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:14px}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:6px;border:2px solid var(--bg)}
  .mono{font-family:var(--mono)}
  .app{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:0 18px 80px}

  /* header */
  header{display:flex;align-items:center;gap:16px;padding:22px 0 18px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:11px}
  .logo .dot{width:11px;height:11px;border-radius:50%;background:var(--acc);box-shadow:0 0 0 4px rgba(255,106,61,.16);animation:pulse 2.4s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(255,106,61,.16)}50%{box-shadow:0 0 0 8px rgba(255,106,61,.04)}}
  .logo h1{font-family:var(--disp);font-size:18px;font-weight:700;letter-spacing:-.01em}
  .logo small{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.18em;text-transform:uppercase;display:block;margin-top:-2px}
  nav{display:flex;gap:4px;margin-left:auto;background:var(--s1);border:1px solid var(--bd);border-radius:11px;padding:4px}
  nav button{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;color:var(--dim);transition:.15s}
  nav button:hover{color:var(--tx)}
  nav button.on{background:var(--s3);color:var(--tx)}

  /* sprint launch bar */
  .launch{display:flex;align-items:center;gap:16px;background:linear-gradient(100deg,var(--s2),var(--s1));border:1px solid var(--bd);border-radius:16px;padding:18px 20px;margin-bottom:20px;position:relative;overflow:hidden}
  .launch::after{content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,106,61,.16),transparent 70%)}
  .launch .lt{flex:1;min-width:200px;position:relative}
  .launch h2{font-family:var(--disp);font-size:19px;font-weight:600;margin-bottom:3px}
  .launch p{color:var(--dim);font-size:13px}
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--acc);color:#1a0d06;font-weight:600;padding:12px 20px;border-radius:10px;font-size:14px;transition:.15s;white-space:nowrap}
  .btn:hover{background:var(--acc-d);color:#fff;transform:translateY(-1px)}
  .btn.ghost{background:var(--s3);color:var(--tx)}
  .btn.ghost:hover{background:var(--bd2);transform:none}
  .btn.sm{padding:7px 13px;font-size:12.5px;border-radius:8px}

  /* stat row */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
  .stat{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:15px 16px}
  .stat .n{font-family:var(--mono);font-size:27px;font-weight:700;line-height:1}
  .stat .l{font-size:11px;color:var(--dim);margin-top:7px;letter-spacing:.02em}
  .stat .sub{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:2px}
  .stat.hl{border-color:var(--acc);background:linear-gradient(160deg,rgba(255,106,61,.10),var(--s1))}
  .stat.hl .n{color:var(--acc)}

  .grid2{display:grid;grid-template-columns:1.35fr 1fr;gap:18px;align-items:start}
  .card{background:var(--s1);border:1px solid var(--bd);border-radius:15px;padding:18px}
  .card h3{font-family:var(--disp);font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .card h3 .tag{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--faint);font-weight:500;letter-spacing:.06em}

  /* pipeline mini */
  .pipe-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--bd)}
  .pipe-row:first-of-type{border-top:none}
  .pipe-row .bar{flex:1;height:7px;background:var(--s3);border-radius:4px;overflow:hidden}
  .pipe-row .bar i{display:block;height:100%;border-radius:4px}
  .pipe-row .pl{width:96px;font-size:12.5px;color:var(--dim);display:flex;align-items:center;gap:7px}
  .pipe-row .pl .sq{width:8px;height:8px;border-radius:2px}
  .pipe-row .pc{font-family:var(--mono);font-size:13px;width:30px;text-align:right;font-weight:700}

  /* followups list */
  .fu{display:flex;align-items:center;gap:11px;padding:11px;border-radius:10px;background:var(--s2);margin-bottom:8px;border:1px solid transparent;transition:.15s}
  .fu:hover{border-color:var(--bd2)}
  .fu .av{width:34px;height:34px;border-radius:9px;background:var(--s3);display:grid;place-items:center;font-family:var(--disp);font-weight:600;font-size:13px;color:var(--cyan);flex-shrink:0}
  .fu .fi{flex:1;min-width:0}
  .fu .fi b{font-size:13.5px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fu .fi span{font-size:11.5px;color:var(--dim)}
  .fu .due{font-family:var(--mono);font-size:10.5px;padding:3px 7px;border-radius:5px;background:rgba(251,191,36,.14);color:var(--warn);white-space:nowrap}
  .fu .due.over{background:rgba(248,113,113,.16);color:var(--lost)}
  .empty{text-align:center;color:var(--faint);padding:26px 10px;font-size:13px}
  .empty b{display:block;color:var(--dim);font-family:var(--disp);margin-bottom:4px}

  /* pipeline board */
  .board-top{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .board-top h2{font-family:var(--disp);font-size:21px;font-weight:600}
  .filters{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap}
  .filters button{font-size:12px;padding:6px 11px;border-radius:7px;background:var(--s1);border:1px solid var(--bd);color:var(--dim)}
  .filters button.on{color:var(--tx);border-color:var(--bd2);background:var(--s3)}
  .lead{display:grid;grid-template-columns:auto 1fr auto auto;gap:13px;align-items:center;background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:13px 15px;margin-bottom:9px;cursor:pointer;transition:.13s}
  .lead:hover{border-color:var(--bd2);transform:translateX(2px)}
  .lead .av{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-family:var(--disp);font-weight:600;font-size:14px;flex-shrink:0}
  .lead .li b{font-size:14.5px;font-weight:600}
  .lead .li span{font-size:12px;color:var(--dim);display:block}
  .lead .svc{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);padding:3px 8px;border:1px solid var(--bd);border-radius:20px}
  .lead .stg{font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;white-space:nowrap}

  /* scripts */
  .scripts-top{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
  .scripts-top h2{font-family:var(--disp);font-size:21px;font-weight:600;width:100%}
  .seg{display:flex;gap:4px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:4px}
  .seg button{padding:7px 13px;border-radius:7px;font-size:12.5px;font-weight:500;color:var(--dim)}
  .seg button.on{background:var(--s3);color:var(--tx)}
  .script{background:var(--s1);border:1px solid var(--bd);border-radius:13px;margin-bottom:13px;overflow:hidden}
  .script .sh{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--bd)}
  .script .sh b{font-family:var(--disp);font-size:13.5px;font-weight:600}
  .script .sh .why{font-size:11.5px;color:var(--dim)}
  .script .sb{padding:15px 16px}
  .script .subj{font-family:var(--mono);font-size:11.5px;color:var(--cyan);margin-bottom:10px;padding:8px 11px;background:var(--s2);border-radius:8px;border-left:2px solid var(--cyan)}
  .script .body{white-space:pre-wrap;font-size:13.5px;line-height:1.62;color:#dde3ea}
  .script .body mark{background:rgba(255,106,61,.18);color:var(--acc);padding:1px 4px;border-radius:4px;font-weight:500}
  .script .sf{display:flex;gap:8px;padding:0 16px 15px;align-items:center}
  .copied{color:var(--won);font-size:12px;font-family:var(--mono);opacity:0;transition:.2s}
  .copied.show{opacity:1}

  /* settings */
  .field{margin-bottom:15px}
  .field label{display:block;font-size:12px;color:var(--dim);margin-bottom:6px;font-weight:500}
  .field label b{color:var(--acc);font-family:var(--mono)}
  .inp{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:10px 12px;color:var(--tx);transition:.15s}
  .inp:focus{outline:none;border-color:var(--acc);background:var(--s1)}
  textarea.inp{resize:vertical;min-height:64px;line-height:1.5}

  /* modal */
  .ov{position:fixed;inset:0;background:rgba(8,11,15,.7);backdrop-filter:blur(4px);z-index:70;display:none;align-items:center;justify-content:center;padding:18px}
  .ov.show{display:flex}
  .modal{background:var(--s1);border:1px solid var(--bd2);border-radius:18px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 70px rgba(0,0,0,.5)}
  .modal .mh{display:flex;align-items:center;padding:18px 20px;border-bottom:1px solid var(--bd)}
  .modal .mh h3{font-family:var(--disp);font-size:16px;font-weight:600}
  .modal .mh button{margin-left:auto;color:var(--dim);font-size:22px;line-height:1;width:30px;height:30px;border-radius:8px}
  .modal .mh button:hover{background:var(--s3);color:var(--tx)}
  .modal .mb{padding:20px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stage-pick{display:flex;flex-wrap:wrap;gap:6px}
  .stage-pick button{font-family:var(--mono);font-size:11px;font-weight:700;padding:6px 11px;border-radius:7px;background:var(--s2);border:1px solid var(--bd);color:var(--dim)}
  .touches{margin-top:6px}
  .touch{display:flex;gap:9px;padding:9px 11px;background:var(--s2);border-radius:9px;margin-bottom:7px;font-size:12.5px}
  .touch .td{font-family:var(--mono);font-size:10.5px;color:var(--faint);white-space:nowrap}

  /* SPRINT cockpit */
  .cockpit{position:fixed;inset:0;z-index:60;background:var(--bg);display:none;flex-direction:column;overflow-y:auto}
  .cockpit.show{display:flex}
  .cockpit::before{content:"";position:fixed;inset:0;pointer-events:none;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:44px 44px;opacity:.4}
  .cp-in{position:relative;max-width:760px;margin:0 auto;width:100%;padding:24px 20px 60px;flex:1}
  .cp-top{display:flex;align-items:center;gap:12px;margin-bottom:24px}
  .cp-top .x{margin-left:auto;color:var(--dim);font-size:13px;padding:8px 14px;border-radius:9px;background:var(--s1);border:1px solid var(--bd)}
  .cp-top .x:hover{color:var(--lost);border-color:var(--lost)}
  .timer-wrap{text-align:center;margin:10px 0 26px}
  .ring{position:relative;width:230px;height:230px;margin:0 auto}
  .ring svg{transform:rotate(-90deg)}
  .ring .time{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .time .t{font-family:var(--mono);font-size:48px;font-weight:700;letter-spacing:-.02em}
  .ring .time .bl{font-family:var(--mono);font-size:11px;color:var(--acc);letter-spacing:.16em;text-transform:uppercase;margin-top:4px}
  .ring .time .of{font-size:11px;color:var(--faint);margin-top:8px;font-family:var(--mono)}
  .cp-ctrl{display:flex;justify-content:center;gap:10px;margin-top:20px}
  .cp-block{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:22px;margin-bottom:14px}
  .cp-block h2{font-family:var(--disp);font-size:20px;font-weight:600;display:flex;align-items:center;gap:11px;margin-bottom:6px}
  .cp-block h2 .num{font-family:var(--mono);font-size:13px;color:var(--acc);background:rgba(255,106,61,.12);width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-weight:700}
  .cp-block .goal{color:var(--dim);font-size:13.5px;margin-bottom:16px;margin-left:45px}
  .check{display:flex;gap:11px;align-items:flex-start;padding:11px 13px;border-radius:10px;background:var(--s2);margin-bottom:8px;cursor:pointer;transition:.13s}
  .check:hover{background:var(--s3)}
  .check .box{width:21px;height:21px;border-radius:6px;border:2px solid var(--bd2);flex-shrink:0;margin-top:1px;display:grid;place-items:center;transition:.13s}
  .check.done .box{background:var(--won);border-color:var(--won)}
  .check.done .box::after{content:"✓";color:#0c1f17;font-weight:700;font-size:13px}
  .check .ct{font-size:13.5px}
  .check.done .ct{color:var(--faint);text-decoration:line-through}
  .cp-act{display:flex;gap:9px;margin-top:14px;flex-wrap:wrap}
  .blocks-nav{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
  .blocks-nav button{font-family:var(--mono);font-size:11px;padding:7px 12px;border-radius:8px;background:var(--s1);border:1px solid var(--bd);color:var(--faint)}
  .blocks-nav button.on{color:var(--tx);border-color:var(--acc);background:rgba(255,106,61,.08)}
  .blocks-nav button.done{color:var(--won);border-color:rgba(52,211,153,.3)}

  .spin{width:30px;height:30px;border-radius:50%;border:3px solid var(--s3);border-top-color:var(--acc);animation:spin .8s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ai-load{text-align:center;color:var(--dim);font-size:13px;padding:34px 10px}
  .ai-err{text-align:center;color:var(--lost);font-size:13px;padding:22px 10px}
  .ai-prog{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .ai-prog .ai-pbar{flex:1;height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
  .ai-prog .ai-pbar i{display:block;height:100%;background:var(--acc);transition:.3s}
  .ai-prog span{font-family:var(--mono);font-size:10.5px;color:var(--faint);white-space:nowrap}
  .ai-lead{display:flex;align-items:center;gap:11px;background:var(--s2);border-radius:11px;padding:11px;margin-bottom:11px}
  .ai-noticed{font-size:12px;color:#dde3ea;background:var(--s2);padding:9px 12px;border-radius:9px;margin-bottom:12px}
  .ai-draft{margin-bottom:12px}
  .ai-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
  .ai-foot{font-size:11px;color:var(--faint);margin-top:11px;line-height:1.5}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s3);border:1px solid var(--bd2);color:var(--tx);padding:11px 18px;border-radius:11px;font-size:13px;z-index:80;opacity:0;transition:.25s;pointer-events:none;box-shadow:0 12px 30px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:880px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .grid2{grid-template-columns:1fr}
    nav{width:100%;margin-left:0;overflow-x:auto}
    .lead{grid-template-columns:auto 1fr auto}
    .lead .svc{display:none}
  }
  @media(max-width:560px){
    header{gap:10px}
    .launch{flex-direction:column;align-items:flex-start}
    .row2{grid-template-columns:1fr}
    .ring{width:200px;height:200px}
  }
</style>

<div class="app">
  <header>
    <div class="logo">
      <span class="dot"></span>
      <div><h1>Outreach Command</h1><small id="hdr-date">loading</small></div>
    </div>
    <nav id="nav">
      <button data-view="dashboard" class="on">Today</button>
      <button data-view="pipeline">Pipeline</button>
      <button data-view="scripts">Scripts</button>
      <button data-view="settings">Setup</button>
    </nav>
  </header>
  <div id="main"></div>
</div>

<!-- sprint cockpit -->
<div class="cockpit" id="cockpit"></div>

<!-- modal -->
<div class="ov" id="ov"><div class="modal" id="modal"></div></div>

<div class="toast" id="toast"></div>

<script>
//////////////////// STATE ////////////////////
const KEY='outreach:data:v1';
const STAGES=[
  {id:'New',c:'#6B7785',bg:'rgba(107,119,133,.16)'},
  {id:'Contacted',c:'#4FB8E8',bg:'rgba(79,184,232,.15)'},
  {id:'Replied',c:'#A78BFA',bg:'rgba(167,139,250,.16)'},
  {id:'Call Booked',c:'#FBBF24',bg:'rgba(251,191,36,.15)'},
  {id:'Won',c:'#34D399',bg:'rgba(52,211,153,.15)'},
  {id:'Lost',c:'#F87171',bg:'rgba(248,113,113,.14)'}
];
const stageMap=Object.fromEntries(STAGES.map(s=>[s.id,s]));
const SERVICES=['Website','App','Ad Mgmt'];
const CHANNELS=['Email','DM','Call'];

let S={
  leads:[],
  stats:{},        // {'2026-06-22':{added,contacted,replies,calls,won}}
  settings:{myName:'',niche:'local businesses',calendarLink:'[your booking link]',offer:'free audit'},
};
let ui={view:'dashboard',filter:'all',svcTab:'Website',chTab:'Email'};
let sprint=null, sprintTimer=null;
let airun=null;

//////////////////// STORAGE ////////////////////
async function load(){
  try{const raw=localStorage.getItem(KEY);if(raw){const d=JSON.parse(raw);S={...S,...d,settings:{...S.settings,...(d.settings||{})}};}}
  catch(e){/* fresh start */}
}
let saveT;
function save(){clearTimeout(saveT);saveT=setTimeout(()=>{
  try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){toast('Could not save to this browser');}
},250);}

//////////////////// HELPERS ////////////////////
const $=(s,r=document)=>r.querySelector(s);
const today=()=>new Date().toISOString().slice(0,10);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function dstat(d=today()){if(!S.stats[d])S.stats[d]={added:0,contacted:0,replies:0,calls:0,won:0};return S.stats[d];}
function bump(k,n=1){dstat()[k]=(dstat()[k]||0)+n;save();}
function initials(n){return (n||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase()||'?';}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function daysFrom(dateStr){if(!dateStr)return null;const d=Math.round((new Date(dateStr)-new Date(today()))/864e5);return d;}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function copy(txt,btn){
  const done=()=>{const c=btn.parentElement.querySelector('.copied');if(c){c.classList.add('show');setTimeout(()=>c.classList.remove('show'),1600);}};
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(done).catch(()=>fb());}else fb();
  function fb(){const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');done();}catch(e){toast('Copy failed');}ta.remove();}
}

//////////////////// DERIVED ////////////////////
function counts(){const c={};STAGES.forEach(s=>c[s.id]=0);S.leads.forEach(l=>c[l.stage]=(c[l.stage]||0)+1);return c;}
function active(){return S.leads.filter(l=>l.stage!=='Won'&&l.stage!=='Lost').length;}
function replyRate(){const contacted=S.leads.filter(l=>l.stage!=='New').length;const replied=S.leads.filter(l=>['Replied','Call Booked','Won'].includes(l.stage)).length;return contacted?Math.round(replied/contacted*100):0;}
function winRate(){const closed=S.leads.filter(l=>['Won','Lost'].includes(l.stage)).length;const won=S.leads.filter(l=>l.stage==='Won').length;return closed?Math.round(won/closed*100):0;}
function dueFollowups(){return S.leads.filter(l=>l.nextFollowUp&&!['Won','Lost'].includes(l.stage)&&daysFrom(l.nextFollowUp)<=0).sort((a,b)=>(a.nextFollowUp||'').localeCompare(b.nextFollowUp||''));}

function tokfill(t){
  return t
    .replace(/\{\{myName\}\}/g,S.settings.myName||'[your name]')
    .replace(/\{\{niche\}\}/g,S.settings.niche||'local businesses')
    .replace(/\{\{calendarLink\}\}/g,S.settings.calendarLink||'[booking link]')
    .replace(/\{\{offer\}\}/g,S.settings.offer||'free audit');
}
function highlight(t){
  // tokens the user fills per-prospect stay highlighted
  return esc(tokfill(t))
    .replace(/\{\{firstName\}\}/g,'<mark>[first name]</mark>')
    .replace(/\{\{company\}\}/g,'<mark>[company]</mark>')
    .replace(/\{\{observation\}\}/g,'<mark>[specific thing you noticed]</mark>');
}
function plainFill(t){
  return tokfill(t).replace(/\{\{firstName\}\}/g,'[first name]').replace(/\{\{company\}\}/g,'[company]').replace(/\{\{observation\}\}/g,'[what you noticed]');
}

}

  const data={company:v('company'),name:v('name'),contact:v('contact'),service:$('#f-service').value,channel:$('#f-channel').value,notes:v('notes'),stage:$('#modal').dataset.stage||'New',nextFollowUp:$('#f-followup').value||''};

  if(id==='new'){
    const lead={id:uid(),createdAt:today(),lastTouch:today(),touches:[],...data};
    S.leads.unshift(lead);bump('added');
    if(lead.stage!=='New')bump('contacted');
    toast('Lead added ✓');
  }else{
    const l=getLead(id);Object.assign(l,data);l.lastTouch=today();
  }
  save();closeModal();render();
}
function moveStage(id,to){
  const l=getLead(id);if(!l)return;const from=l.stage;l.stage=to;l.lastTouch=today();
  l.touches=l.touches||[];l.touches.push({date:today(),label:'Moved to '+to});
  if(from==='New'&&to!=='New')bump('contacted');
  if(to==='Replied')bump('replies');
  if(to==='Call Booked')bump('calls');
  if(to==='Won')bump('won');
  if(to==='Contacted'||to!=='New'){/* clear no fu */}
  save();
}

//////////////////// SPRINT COCKPIT ////////////////////
const SPRINT_BLOCKS=[
 {name:'Prospect',min:20,goal:'Build your hit-list. Quantity here — quality comes next.',
  checks:['Open your lead source (Google Maps / IG / a directory for your niche)','Add 15–25 new leads — just business name + contact for now','For each, jot ONE thing you noticed in the notes field','Don\'t message yet. Just fill the list.'],
  act:[{l:'+ Add lead',a:'add'},{l:'View pipeline',a:'pipeline'}]},
 {name:'Personalize & send',min:55,goal:'First touch to every new lead. Personal first line, copy the script, send.',
  checks:['Work through your New leads one by one','Open the matching script (Website / App / Ads)','Swap in the first name + the thing you noticed','Send it, then move the lead to “Contacted”','Set a follow-up date 2–3 days out'],
  act:[{l:'✨ AI outreach run',a:'airun-new'},{l:'Open scripts',a:'scripts'},{l:'View New leads',a:'pipeline-new'}]},
 {name:'Follow up',min:35,goal:'This is where clients come from. Hit everyone who\'s due.',
  checks:['Open today\'s follow-ups','Use the follow-up sequence (touch 2, 3, or 4)','Send, then bump the next follow-up date','Anyone who replied → move to “Replied”'],
  act:[{l:'✨ AI follow-ups',a:'airun-fu'},{l:'Follow-ups due',a:'dashboard'},{l:'Scripts',a:'scripts-fu'}]},
 {name:'Book & log',min:10,goal:'Convert replies into calls and set up tomorrow.',
  checks:['Reply to anyone who responded — push for a quick call','Send your booking link to warm leads','Mark booked calls as “Call Booked”','Glance at tomorrow\'s follow-ups so you\'re ready'],
  act:[{l:'View pipeline',a:'pipeline'}]},
];
function startSprint(){
  sprint={block:0,remaining:SPRINT_BLOCKS[0].min*60,running:true,checks:SPRINT_BLOCKS.map(b=>b.checks.map(()=>false))};
  $('#cockpit').classList.add('show');
  renderCockpit();
  tick();
}
function endSprint(){
  sprint=null;clearInterval(sprintTimer);sprintTimer=null;
  $('#cockpit').classList.remove('show');render();
}
function tick(){
  clearInterval(sprintTimer);
  sprintTimer=setInterval(()=>{
    if(!sprint||!sprint.running)return;
    sprint.remaining--;
    if(sprint.remaining<=0){
      if(sprint.block<SPRINT_BLOCKS.length-1){sprint.block++;sprint.remaining=SPRINT_BLOCKS[sprint.block].min*60;toast('Next block: '+SPRINT_BLOCKS[sprint.block].name);renderCockpit();}
      else{sprint.remaining=0;sprint.running=false;toast('Sprint complete — nice work! 💪');}
    }
    updateTimer();
  },1000);
}
function fmt(s){const m=Math.floor(s/60),x=s%60;return m+':'+String(x).padStart(2,'0');}
function updateTimer(){
  if(!sprint)return;
  const b=SPRINT_BLOCKS[sprint.block];const tot=b.min*60;
  const pct=1-sprint.remaining/tot;
  const c=2*Math.PI*100;
  const ring=$('#ring-fg');if(ring)ring.style.strokeDashoffset=c*(1-pct);
  const t=$('#cp-time');if(t)t.textContent=fmt(sprint.remaining);
}
function gotoFromSprint(a){
  if(a==='airun-new'){openAIRunner('new');return;}
  if(a==='airun-fu'){openAIRunner('followup');return;}
  endSprint();
  if(a==='add'){ui.view='pipeline';render();openModal(leadFormModal());$('#modal').dataset.stage='New';}
  else if(a==='pipeline'){ui.view='pipeline';ui.filter='all';render();}
  else if(a==='pipeline-new'){ui.view='pipeline';ui.filter='New';render();}
  else if(a==='scripts'){ui.view='scripts';render();}
  else if(a==='scripts-fu'){ui.view='scripts';render();setTimeout(()=>window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}),100);}
  else if(a==='dashboard'){ui.view='dashboard';render();}
}
function renderCockpit(){
  const b=SPRINT_BLOCKS[sprint.block];
  const c=2*Math.PI*100;
  $('#cockpit').innerHTML=`
  <div class="cp-in">
    <div class="cp-top">
      <div class="logo"><span class="dot"></span><div><h1 style="font-family:var(--disp);font-size:16px;font-weight:700">2-Hour Sprint</h1><small style="font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.18em">FOCUS MODE</small></div></div>
      <button class="x" data-endsprint="1">End sprint ×</button>
    </div>

    <div class="timer-wrap">
      <div class="ring">
        <svg width="230" height="230" viewBox="0 0 230 230">
          <circle cx="115" cy="115" r="100" fill="none" stroke="var(--s3)" stroke-width="10"/>
          <circle id="ring-fg" cx="115" cy="115" r="100" fill="none" stroke="var(--acc)" stroke-width="10" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c*(1-(1-sprint.remaining/(b.min*60)))}"/>
        </svg>
        <div class="time"><div class="t" id="cp-time">${fmt(sprint.remaining)}</div><div class="bl">${b.name}</div><div class="of">block ${sprint.block+1} of 4 · ${b.min} min</div></div>
      </div>
      <div class="cp-ctrl">
        <button class="btn ghost sm" data-pause="1">${sprint.running?'⏸ Pause':'▶ Resume'}</button>
        <button class="btn ghost sm" data-skip="1">Skip block →</button>
        <button class="btn ghost sm" data-add5="1">+5 min</button>
      </div>
    </div>

    <div class="blocks-nav">
      ${SPRINT_BLOCKS.map((bl,i)=>`<button class="${i===sprint.block?'on':''} ${i<sprint.block?'done':''}" data-jumpblock="${i}">${i<sprint.block?'✓ ':''}${i+1}. ${bl.name}</button>`).join('')}
    </div>

    <div class="cp-block">
      <h2><span class="num">${sprint.block+1}</span>${b.name}</h2>
      <div class="goal">${b.goal}</div>
      ${b.checks.map((ch,i)=>`<div class="check ${sprint.checks[sprint.block][i]?'done':''}" data-check="${i}"><div class="box"></div><div class="ct">${esc(ch)}</div></div>`).join('')}
      <div class="cp-act">${b.act.map(a=>`<button class="btn sm" data-cpgo="${a.a}">${a.l}</button>`).join('')}</div>
    </div>
  </div>`;
  updateTimer();
}

//////////////////// AI WRITER ////////////////////
async function aiGenerate(l,mode){
  const s=S.settings;
  const first=((l.name||'').trim().split(/\s+/)[0])||'there';
  const company=l.company||(l.name?l.name+"'s business":'their business');
  const ch=l.channel||'Email';
  const offer=s.offer||'free audit';
  const link=(s.calendarLink&&!/^\[/.test(s.calendarLink))?s.calendarLink:'';
  const me=s.myName||'me';
  const niche=s.niche||'local businesses';
  const noticed=(l.notes||'').trim();
  const touchNum=((l.touches||[]).filter(t=>/sent|follow/i.test(t.label)).length)+1;

  const typeName=ch==='Email'?'cold email':ch==='DM'?'Instagram/LinkedIn direct message':'cold call opener plus a 2-sentence voicemail';
  const fmtRule=ch==='Email'?'Keep the body under 90 words.':ch==='DM'?'Keep it under 55 words, casual, at most one emoji.':'Keep it short and natural to say out loud, 4-6 sentences max.';

  let intent;
  if(mode==='followup'){
    intent=touchNum>=4
      ? `Write a brief, gracious "break-up" follow-up (attempt ${touchNum}). They never replied — bow out warmly and leave the door open, no guilt-tripping.`
      : `Write a short, friendly follow-up (attempt ${touchNum}) in a cold-outreach sequence. They haven't replied yet. Re-offer the ${offer} or mention you already put it together. Low pressure.`;
  }else{
    intent=`Write a first-touch ${typeName} that starts a real conversation.`;
  }
  const obs=noticed
    ? `Open by naturally referencing the specific thing the sender noticed about the business: "${noticed}". Don't quote it robotically.`
    : `No specific observation was provided. Open with an honest, non-presumptuous hook relevant to a ${niche} business. Do NOT invent fake specifics or fake compliments.`;

  const prompt=`You are a top cold-outreach copywriter. The sender sells ${l.service||'websites'} to ${niche}. Write ONE message only.

${intent}

Details:
- Recipient first name: ${first}
- Business: ${company}
- Service being offered: ${l.service||'a website'}
- Free value to lead with: ${offer}
- Sign off as: ${me}
${link?`- Booking link to use if you add a call CTA: ${link}`:'- No booking link available; ask for a reply or a quick chat instead.'}

${obs}

Rules:
- Sound like a real person messaging a busy owner: warm, direct, specific. No "I hope this finds you well", no buzzwords, no hype.
- Lead with value, not a hard pitch. Exactly one clear, low-friction call to action.
- ${fmtRule}
- Finished and ready to send: no placeholders, no brackets, no notes to the sender.
${ch==='Email'?'\nReturn ONLY valid minified JSON: {"subject":"...","body":"..."} — no markdown, no code fences, no text before or after.':'\nReturn ONLY the message text — no quotes, no labels, no markdown.'}`;

  const apiKey=(S.settings.apiKey||'').trim();
  if(!apiKey)throw new Error('NO_KEY');
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})
  });
  if(!res.ok)throw new Error('http '+res.status);
  const data=await res.json();
  let text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
  if(ch==='Email'){
    let c=text.replace(/```json/gi,'').replace(/```/g,'').trim();
    const a=c.indexOf('{'),b=c.lastIndexOf('}');
    if(a>=0&&b>a)c=c.slice(a,b+1);
    try{const o=JSON.parse(c);return {subject:(o.subject||'').trim(),body:(o.body||'').trim()};}
    catch(e){return {subject:'Quick idea for '+company,body:text};}
  }
  return {subject:'',body:text};
}

function openAIRunner(kind,id){
  let queue,mode;
  if(kind==='single'){const l=getLead(id);if(!l)return;queue=[id];mode=l.stage==='New'?'first':'followup';}
  else if(kind==='followup'){queue=dueFollowups().map(l=>l.id);mode='followup';}
  else{queue=S.leads.filter(l=>l.stage==='New').map(l=>l.id);mode='first';}
  if(!queue.length){toast(kind==='followup'?'No follow-ups are due right now':'No leads in "New" to reach out to');return;}
  airun={queue,idx:0,mode,single:kind==='single',loading:false,error:null,draft:{subject:'',body:''}};
  renderAIRunner();aiCurrentGenerate();
}
function aiModeLabel(l){
  if(airun.mode==='followup'){const n=((l.touches||[]).filter(t=>/sent|follow/i.test(t.label)).length)+1;return 'Follow-up #'+n;}
  return 'First touch';
}
function renderAIRunner(){
  const l=getLead(airun.queue[airun.idx]);
  if(!l){closeModal();airun=null;return;}
  const st=stageMap[l.stage]||STAGES[0];
  const total=airun.queue.length;
  const isEmail=l.channel==='Email';
  const emailValid=isEmail&&/@/.test(l.contact||'');
  let mid;
  if(airun.loading){
    mid=`<div class="ai-load"><div class="spin"></div><div>Writing a personalized ${isEmail?'email':l.channel==='DM'?'DM':'script'} for ${esc(l.company||l.name||'this lead')}…</div></div>`;
  }else if(airun.error){
    mid=`<div class="ai-err">${esc(airun.error)}<div style="margin-top:12px"><button class="btn sm" data-aigen="1">↻ Try again</button></div></div>`;
  }else{
    mid=`${isEmail?`<input class="inp" data-aisubject="1" placeholder="Subject line" value="${esc(airun.draft.subject)}" style="margin-bottom:9px;font-family:var(--mono);font-size:12.5px">`:''}<textarea class="inp" data-aibody="1" style="min-height:180px;font-size:13.5px;line-height:1.58">${esc(airun.draft.body)}</textarea>`;
  }
  const actions=(!airun.loading&&!airun.error)?`
    <div class="ai-actions">
      <button class="btn ghost sm" data-aigen="1">↻ Regenerate</button>
      <button class="btn ghost sm" data-aicopydraft="1">Copy</button>
      ${emailValid?`<button class="btn ghost sm" data-aimail="1">✉ Open in email</button>`:''}
      <button class="btn sm" data-aimark="1" style="margin-left:auto">${airun.idx<total-1?'Mark sent → next':'Mark sent · done'}</button>
      ${total>1?`<button class="btn ghost sm" data-aiskip="1">Skip</button>`:''}
    </div>
    <div class="ai-foot">✦ The AI writes it — you hit send. Keeping yourself on the send button lets you tweak it and protects your email deliverability.</div>`:'';
  openModal(`
    <div class="mh"><h3>✨ AI outreach</h3><button data-close="1">×</button></div>
    <div class="mb">
      ${total>1?`<div class="ai-prog"><div class="ai-pbar"><i style="width:${airun.idx/total*100}%"></i></div><span>Lead ${airun.idx+1} of ${total}</span></div>`:''}
      <div class="ai-lead">
        <div class="av" style="width:40px;height:40px;border-radius:11px;background:${st.bg};color:${st.c};display:grid;place-items:center;font-family:var(--disp);font-weight:600">${initials(l.company||l.name)}</div>
        <div style="flex:1;min-width:0"><b style="font-size:14.5px">${esc(l.company||l.name||'Lead')}</b><div style="font-size:12px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(l.name||'')}${l.contact?' · '+esc(l.contact):''}</div></div>
        <div style="text-align:right;flex-shrink:0"><div class="mono" style="font-size:10.5px;color:var(--acc);font-weight:700">${aiModeLabel(l)}</div><div style="font-size:11px;color:var(--faint)">${l.service} · ${l.channel}</div></div>
      </div>
      ${l.notes?`<div class="ai-noticed"><span style="color:var(--acc)">Noticed:</span> ${esc(l.notes)}</div>`:`<div class="ai-noticed" style="color:var(--warn)">⚠ No "what you noticed" note yet — add one (Edit details) for sharper, more personal messages.</div>`}
      <div class="ai-draft">${mid}</div>
      ${actions}
    </div>`);
}
function aiCurrentGenerate(){
  const l=getLead(airun.queue[airun.idx]);if(!l)return;
  airun.loading=true;airun.error=null;renderAIRunner();
  aiGenerate(l,airun.mode).then(out=>{
    if(!airun)return;airun.draft={subject:out.subject||'',body:out.body||''};airun.loading=false;renderAIRunner();
  }).catch((e)=>{
    if(!airun)return;airun.loading=false;
    airun.error=(e&&e.message==='NO_KEY')?'Add your Anthropic API key in Setup first, then tap Try again.':'Couldn’t reach the AI writer. Check your API key / connection and tap Try again.';
    renderAIRunner();
  });
}
function aiAdvance(logged){
  const l=getLead(airun.queue[airun.idx]);
  if(logged&&l){
    l.touches=l.touches||[];
    if(airun.mode==='followup'){l.touches.push({date:today(),label:'Followed up (AI)'});}
    else{l.touches.push({date:today(),label:'First touch sent (AI)'});if(l.stage==='New'){l.stage='Contacted';bump('contacted');}}
    l.lastTouch=today();
    const dt=new Date();dt.setDate(dt.getDate()+3);l.nextFollowUp=dt.toISOString().slice(0,10);
    save();
  }
  if(airun.idx<airun.queue.length-1){airun.idx++;airun.draft={subject:'',body:''};aiCurrentGenerate();}
  else{closeModal();airun=null;render();toast(logged?'Outreach run complete ✓':'Done');}
}
function aiMail(){const l=getLead(airun.queue[airun.idx]);if(!l)return;openMail(l.contact,airun.draft.subject,airun.draft.body);}
function openMail(email,subject,body){const a=document.createElement('a');a.href='mailto:'+encodeURIComponent(email||'')+'?subject='+encodeURIComponent(subject||'')+'&body='+encodeURIComponent(body||'');document.body.appendChild(a);a.click();a.remove();}
function copyText(txt){const ok=()=>toast('Copied ✓');if(navigator.clipboard){navigator.clipboard.writeText(txt).then(ok).catch(fb);}else fb();function fb(){const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');ok();}catch(e){toast('Copy failed');}ta.remove();}}

//////////////////// EVENTS ////////////////////
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-view],[data-go],[data-sprint],[data-add],[data-filter],[data-svc],[data-ch],[data-copy],[data-lead],[data-close],[data-saveLead],[data-stage],[data-move],[data-editlead],[data-dellead],[data-logtouch],[data-export],[data-reset],[data-endsprint],[data-pause],[data-skip],[data-add5],[data-jumpblock],[data-check],[data-cpgo],[data-airun],[data-aicompose],[data-aigen],[data-aimark],[data-aiskip],[data-aimail],[data-aicopydraft]');
  if(!t)return;
  const d=t.dataset;

  if(d.view){ui.view=d.view;render();window.scrollTo(0,0);}
  else if(d.go){ui.view=d.go;render();}
  else if(d.sprint){startSprint();}
  else if(d.add){openModal(leadFormModal());$('#modal').dataset.stage='New';}
  else if(d.filter){ui.filter=d.filter;render();}
  else if(d.svc){ui.svcTab=d.svc;render();}
  else if(d.ch){ui.chTab=d.ch;render();}
  else if(d.copy){copy(scriptText(d.copy),t);}
  else if(d.close!==undefined){closeModal();}
  else if(d.saveLead){saveLeadFromForm(d.saveLead);}
  else if(d.stage){ // stage pick inside form
    $('#f-stage').querySelectorAll('button').forEach(b=>{b.classList.remove('on');b.style.cssText='';});
    t.classList.add('on');const st=stageMap[d.stage];t.style.cssText=`background:${st.bg};color:${st.c};border-color:${st.c}`;
    $('#modal').dataset.stage=d.stage;
  }
  else if(d.move){moveStage(d.move,d.tostage);openModal(leadDetailModal(getLead(d.move)));render();}
  else if(d.editlead){openModal(leadFormModal(getLead(d.editlead)));$('#modal').dataset.stage=getLead(d.editlead).stage;}
  else if(d.dellead){S.leads=S.leads.filter(l=>l.id!==d.dellead);save();closeModal();render();toast('Lead deleted');}
  else if(d.logtouch){const l=getLead(d.logtouch);l.touches=l.touches||[];l.touches.push({date:today(),label:'Followed up'});l.lastTouch=today();const dt=new Date();dt.setDate(dt.getDate()+3);l.nextFollowUp=dt.toISOString().slice(0,10);save();openModal(leadDetailModal(l));render();toast('Logged · next follow-up in 3 days');}
  else if(d.lead){openModal(leadDetailModal(getLead(d.lead)));}
  else if(d.export){exportData();}
  else if(d.reset){if(confirm('Delete all leads and stats? This cannot be undone.')){S={leads:[],stats:{},settings:S.settings};save();render();toast('Reset done');}}
  else if(d.endsprint){endSprint();}
  else if(d.pause){sprint.running=!sprint.running;renderCockpit();}
  else if(d.skip){if(sprint.block<3){sprint.block++;sprint.remaining=SPRINT_BLOCKS[sprint.block].min*60;renderCockpit();}else{endSprint();toast('Sprint complete 💪');}}
  else if(d.add5){sprint.remaining+=300;updateTimer();}
  else if(d.jumpblock){sprint.block=+d.jumpblock;sprint.remaining=SPRINT_BLOCKS[sprint.block].min*60;renderCockpit();}
  else if(d.check!==undefined){const i=+d.check;sprint.checks[sprint.block][i]=!sprint.checks[sprint.block][i];renderCockpit();}
  else if(d.cpgo){gotoFromSprint(d.cpgo);}
  else if(d.airun){openAIRunner(d.airun);}
  else if(d.aicompose){openAIRunner('single',d.aicompose);}
  else if(d.aigen){aiCurrentGenerate();}
  else if(d.aimark){aiAdvance(true);}
  else if(d.aiskip){aiAdvance(false);}
  else if(d.aimail){aiMail();}
  else if(d.aicopydraft){copyText((airun.draft.subject?('Subject: '+airun.draft.subject+'\n\n'):'')+airun.draft.body);}
});
// click outside modal
$('#ov').addEventListener('click',e=>{if(e.target.id==='ov')closeModal();});
// settings inputs
document.addEventListener('input',e=>{
  const set=e.target.dataset.set;
  if(set){S.settings[set]=e.target.value;save();}
  const fu=e.target.dataset.setfu;
  if(fu){const l=getLead(fu);if(l){l.nextFollowUp=e.target.value;save();render();}}
  if('aisubject' in e.target.dataset && airun){airun.draft.subject=e.target.value;}
  if('aibody' in e.target.dataset && airun){airun.draft.body=e.target.value;}
});

function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='outreach-backup-'+today()+'.json';a.click();
  toast('Backup downloaded');
}

(async()=>{ await load(); render(); })();
